services:
  caosmos:
    # Use 'image' for remote registry or 'build' for local development
    image: ghcr.io/alexpicode/caosmos:latest
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    # image: caosmos:latest
    container_name: caosmos
    ports:
      - "${HOST_PORT:-8080}:${CONTAINER_PORT:-8080}"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=${CONTAINER_PORT:-8080}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}
      - GOOGLE_AI_MODEL=${GOOGLE_AI_MODEL}
    volumes:
      - ./config:/app/config
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${CONTAINER_PORT:-8080}/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

#  ollama:
#    image: ollama/ollama:latest
#    container_name: ollama
#    ports:
#      - "11434:11434"
#    volumes:
#      - ollama_data:/root/.ollama
#    restart: unless-stopped

volumes:
  ollama_data:
    driver: local

networks:
  default:
    name: caosmos-network
